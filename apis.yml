aid: demo-ckan-org
name: CKAN Demo
description: >-
  CKAN Demo is a organization open-data portal running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 13 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
kind: organization
