apis:
  - aid: demo-ckan-org:catalog
    name: CKAN Demo CKAN Action API
    description: >-
      CKAN Action API for CKAN Demo, a consistent JSON-over-HTTP interface over a catalog of 13 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://demo.ckan.org/api/3/action/.
    humanURL: https://demo.ckan.org
    baseURL: https://demo.ckan.org/api/3/action
